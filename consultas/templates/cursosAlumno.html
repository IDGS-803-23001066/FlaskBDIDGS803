{% extends "layout.html" %}
{% block container %}

<div class="max-w-4xl mx-auto">

<h2 class="text-2xl font-semibold mb-6">
Consultar cursos por alumno
</h2>

<div class="bg-white p-6 rounded-lg shadow border mb-6">

<form method="POST" class="flex gap-4 items-center">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<select name="alumno_id"
class="border px-3 py-2 rounded-lg w-64">

{% for alumno in alumnos %}

<option value="{{alumno.id}}">
{{alumno.nombre}} {{alumno.apaterno}}
</option>

{% endfor %}

</select>

<button type="submit"
class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
Consultar
</button>

</form>

</div>


{% if alumno %}

<h3 class="text-lg font-bold mb-4">
Alumno: {{alumno.nombre}} {{alumno.apaterno}}
</h3>

<div class="bg-white shadow rounded-lg border overflow-hidden">

<table class="w-full text-sm text-left">

<thead class="bg-gray-100 border-b">

<tr>
<th class="px-6 py-3">ID</th>
<th class="px-6 py-3">Curso</th>
<th class="px-6 py-3">Descripción</th>
</tr>

</thead>

<tbody>

{% for curso in cursos %}

<tr class="border-b hover:bg-gray-50">

<td class="px-6 py-3">
{{curso.id}}
</td>

<td class="px-6 py-3">
{{curso.nombre}}
</td>

<td class="px-6 py-3">
{{curso.descripcion}}
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endif %}

</div>

{% endblock %}
