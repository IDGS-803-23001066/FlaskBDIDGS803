{% extends "layout.html" %}
{% block container %}
<h2 class="text-xl font-bold mb-4">Alumnos inscritos a un curso</h2>

<form method="POST" class="mb-4">
    {{ form.curso_id.label }} {{ form.curso_id() }}
    <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded">Consultar</button>
</form>

{% if alumnos %}
    <ul class="list-disc pl-5">
    {% for alumno in alumnos %}
        <li>{{ alumno.nombre }} {{ alumno.apaterno }} - {{ alumno.email }}</li>
    {% endfor %}
    </ul>
{% endif %}
{% endblock %}
