{% extends "layout.html" %}
{% block container %}

<div class="flex justify-center mt-10">

    <div class="relative bg-neutral-primary-soft max-w-xs w-full p-6 border border-default rounded-base shadow-xs">

        <div class="flex flex-col items-center">

            <img class="w-24 h-24 mb-6 rounded-full"
                 src="{{ url_for('static', filename='img/user.png') }}"
                 alt="Maestro"/>

            <h5 class="mb-0.5 text-xl font-semibold tracking-tight text-heading text-center">
                {{ nombre }} {{ apellidos }}
            </h5>

            <span class="text-sm text-body mb-4">
                {{ email }}
            </span>

            <span class="text-sm text-body mb-4">
                {{ especialidad }}
            </span>

            <div class="flex mt-4 gap-4">
                <a href="{{ url_for('maestros.lista_maestros') }}"
                   class="inline-flex items-center text-white bg-brand hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium rounded-base text-sm px-4 py-2.5">
                    Regresar
                </a>
            </div>

        </div>
    </div>

</div>

{% endblock %}
