{% extends "layout.html" %}
{% block container %}

<div class="max-w-lg mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-6">
Detalles del Curso
</h2>

<div class="mb-4">
<label class="font-semibold">Nombre del Curso</label>
<p>{{ nombre }}</p>
</div>

<div class="mb-4">
<label class="font-semibold">Descripción</label>
<p>{{ descripcion }}</p>
</div>

<div class="mb-4">
<label class="font-semibold">Maestro</label>
<p>{{ maestro }}</p>
</div>

<div class="mt-6">
<a href="{{ url_for('cursos.lista_cursos') }}"
class="bg-blue-500 text-white px-4 py-2 rounded">
Regresar
</a>
</div>

</div>

{% endblock %}
