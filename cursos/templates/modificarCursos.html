{% extends "layout.html" %}
{% block container %}

<div class="max-w-lg mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-6">
Modificar Curso
</h2>

<form method="POST">

  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<input type="hidden" name="id" value="{{ form.id.data }}">

<div class="mb-4">
<label>Nombre del Curso</label>
<input type="text"
name="nombre"
value="{{ form.nombre.data }}"
class="w-full border rounded p-2">
</div>

<div class="mb-4">
<label>Descripción</label>
<textarea
name="descripcion"
class="w-full border rounded p-2">{{ form.descripcion.data }}</textarea>
</div>

<div class="mb-4">
<label>Maestro</label>

<select name="maestro_id" class="w-full border rounded p-2">

{% for value,label in form.maestro_id.choices %}

<option value="{{value}}"
{% if value == form.maestro_id.data %}
selected
{% endif %}
>
{{label}}
</option>

{% endfor %}

</select>

</div>

<div class="flex gap-3">

<button
type="submit"
class="bg-green-500 text-white px-4 py-2 rounded">
Guardar
</button>

<a href="{{ url_for('cursos.lista_cursos') }}"
class="bg-gray-500 text-white px-4 py-2 rounded">
Cancelar
</a>

</div>

</form>

</div>

{% endblock %}
